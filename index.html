<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bestell App</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/icons/bestellapp_logo_2.svg"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/assets.css" />
    <script type="module" src="./scripts.js"></script>
    <script type="module" src="./scripts/render.js"></script>
  </head>
  <body>
    <header>
      <div class="main-header">
        <img
          class="header-img"
          src="./assets/icons/bestellapp_logo_2.svg"
          alt="Logo Bestellapp"
        />
        <img
          class="header-img"
          src="./assets/icons/menu_logo.svg"
          alt="Menü ist ein Platzhalter"
        />
      </div>
    </header>

    <main>
      <div class="top-images">
        <img class="background-img" src="./assets/imgs/hero.png" alt="" />
        <img
          class="burger-img"
          src="./assets/imgs/burgerhouse_logo.png"
          alt=""
        />
      </div>

      <section class="section-headline">
        <div class="burgerHouse-container">
          <h1>
            <span class="word-BurgerHouse word-burger">Burger</span
            ><span class="word-BurgerHouse">House</span>
          </h1>
          <button class="stars-button">
            <img
              class="star-img"
              src="./assets/icons/star-regular-full.svg"
              alt="Stern weiß, gefällt mir nicht geklickt"
            />
            <p>
              <span class="count-zero-five" data-base="4,1">4,1</span>
              <span class="total-count" data-base="317">(317)</span>
            </p>
          </button>
        </div>
        <p class="sentence-headline">
          The best Burgers, Pizza, and Greens, all in one great place
        </p>
      </section>

      <div class="content-wrapper" >
      <article class="menu-wrapper" id="menu-container">
      </article>
      <article class="basket-wrapper" >
        <div class="basket" ></div>

      </article>
      </div>
    </main>

    <footer>
      <div class="main-footer">
        <p class="copyright-footer-container">
          <span class="copyright-logo"
            ><img src="./assets/icons/copyright.svg" alt="Copyright Logo" />
          </span>
          BurgerHouse
        </p>
        <p>Imprint</p>
        <p>Cookie Preferences</p>
      </div>
    </footer>
  </body>
</html>
