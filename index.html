<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="scripts.js"></script>
    <title>BestellApp</title>
  </head>
  <body onload="init(menu)">
    <header class="header">
      <div class="header__nav">
        <img
          class="header__img header__img--none"
          src="./assets/icons/bestellapp_logo_1.svg"
          alt="Logo Bestellapp"
        />
        <img
          class="header__img"
          src="./assets/icons/menu_logo.svg"
          alt="Menü ist ein Platzhalter"
        />
      </div>
    </header>

    <main>
      <div class="hero-stack">
        <img class="hero-stack__background" src="./assets/imgs/hero.png" />
        <img
          class="hero-stack__foreground"
          src="./assets/imgs/burgerhouse_logo.png"
        />
      </div>

      <section class="headline">
        <div class="headline__container">
          <h1>
            <span class="headline__title-word headline__title-word--burger"
              >Burger</span
            ><span class="headline__title-word">House</span>
          </h1>
          <button class="headline__rating">
            <img
              class="headline__rating-icon"
              src="./assets/icons/star-regular-full.svg"
              alt="Stern weiß, keinen Stern vergeben."
            />
            <p>
              <span class="headline__rating-value" data-base="4,1">4,1</span>
              <span class="headline__rating-count" data-base="317">(317)</span>
            </p>
          </button>
        </div>
        <p class="headline__subtitle">
          The best Burgers, Pizza, and Greens, all in one great place
        </p>
      </section>

      <div class="content__wrapper">
        <section id="menu-container" class="menu__section"></section>
        <aside id="desktop-basket-container" class="basket__section"></aside>
      </div>

      <!-- Overlay für Bestellbestätigung -->
      <div class="overlay overlay--hidden">
        <div class="overlay__message-box message-box">
          <button class="message-box__close-button" id="closeButton">
            <img src="assets/icons/x-symbol.svg" alt="Close Button" />
          </button>
          <img
            class="message-box__image"
            src="assets/icons/delivery_car.svg"
            alt="Delivery Car"
          />
          <p class="message-box__text message-box__text--confirmed">
            Order confirmed!
          </p>
          <p class="message-box__text message-box__text--on-the-way">
            Your food is on the way!
          </p>
        </div>
      </div>

      <!-- Mobile-Warenkorb-Overlay -->
      <div id="basket-overlay" class="basket-overlay basket-overlay--hidden">
        <div id="mobile-basket-container" class="basket__section"></div>
      </div>

      <!-- Bottom-Nav -->
      <div class="bottom__nav">
        <img
          class="bottom-nav__basket-toggle-icon"
          src="./assets/icons/Home.svg"
          alt="Home-Button"
        />
        <img src="assets/icons/Profile.svg" alt="Profil anzeigen" />
        <img src="assets/icons/orders.svg" alt="Bestellungen anzeigen" />
        <button id="button-toggle" class="bottom__nav--button">
          <img
            src="assets/icons/shopping_cart.svg"
            alt="Warenkorb anzeigen"
          />
        </button>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__text">
        <p class="footer_description">
          <span class="footer__img"
            ><img src="./assets/icons/copyright.svg" alt="Copyright Logo" />
          </span>
          2026 BurgerHouse
        </p>
        <p class="footer_description">Imprint</p>
        <p class="footer_description">Cookie Preferences</p>
      </div>
    </footer>
  </body>
</html>
